services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
      POSTGRES_DB: mission_control
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  db-init:
    image: postgres:15
    depends_on:
      - db
    environment:
      PGPASSWORD: openclaw
    volumes:
      - ./:/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-lc"]
    command: >
      "until pg_isready -h db -U openclaw -d mission_control; do sleep 1; done;
      psql -h db -U openclaw -d mission_control -v ON_ERROR_STOP=1 -f db/schema.sql;
      psql -h db -U openclaw -d mission_control -v ON_ERROR_STOP=1 -f db/seed.sql;"
    restart: "no"

volumes:
  pgdata:
